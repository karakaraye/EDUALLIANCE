<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="EDUALLIANCE logo">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#00C38A"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="100" height="100" x="14" y="14" rx="16" fill="url(#g)" filter="url(#s)" />

  <!-- stylized mark: three vertical columns (building-like) -->
  <g transform="translate(28,28)" fill="#072017">
    <rect x="0" y="10" width="12" height="56" rx="2" />
    <rect x="18" y="2" width="12" height="64" rx="2" />
    <rect x="36" y="18" width="12" height="48" rx="2" />
  </g>

  <!-- highlight accents -->
  <g transform="translate(28,28)" fill="white" opacity="0.06">
    <rect x="0" y="10" width="12" height="8" rx="2" />
    <rect x="18" y="2" width="12" height="8" rx="2" />
    <rect x="36" y="18" width="12" height="8" rx="2" />
  </g>

</svg>